<title>Real Match Manager 26</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--cyan:#00D9FF;--gold:#FFD700;--green:#10B981;--red:#EF4444;--amber:#F59E0B;--bg:#0A0E1A;--card:#131A2D;--border:rgba(255,255,255,0.08);}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;}
.app{width:min(390px,100vw);height:min(844px,100vh);background:var(--bg);overflow:hidden;position:relative;}
@media(min-width:420px){body{padding:20px;background:#060810;}.app{border-radius:40px;border:8px solid #1a1a1a;box-shadow:0 0 80px rgba(0,217,255,0.15);}}
#scr{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;}
#scr::-webkit-scrollbar{display:none;}

/* TOPBAR */
.tb{position:sticky;top:0;z-index:50;background:rgba(10,14,26,0.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:12px 18px 10px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--border);}
.tb-back{width:36px;height:36px;border-radius:50%;background:var(--card);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background 0.2s;}
.tb-back:active{background:#1e2a42;}
.tb-title{font-size:17px;font-weight:700;flex:1;}
.tb-action{font-size:12px;color:var(--cyan);font-weight:700;cursor:pointer;}

/* BOTTOM NAV */
.bn{position:absolute;bottom:0;left:0;right:0;background:rgba(10,14,26,0.98);border-top:0.5px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 16px;z-index:100;}
.bni{display:flex;flex-direction:column;align-items:center;gap:2px;color:#6B7280;font-size:8px;cursor:pointer;padding:0 8px;transition:color 0.2s,transform 0.15s;}
.bni.act{color:var(--cyan);}
.bni.act i{transform:translateY(-2px);}
.bni i{font-size:22px;transition:transform 0.15s;}

/* CARDS */
.card{background:var(--card);border-radius:16px;padding:16px;border:0.5px solid var(--border);transition:transform 0.15s,border-color 0.2s;}
.card:active{transform:scale(0.99);}
.card-sm{background:var(--card);border-radius:12px;padding:12px;border:0.5px solid var(--border);}

/* BUTTONS */
.btn{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;display:block;margin-bottom:10px;transition:opacity 0.2s,transform 0.1s;}
.btn:active{opacity:0.85;transform:scale(0.98);}
.btn-gold{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;}
.btn-cyan{background:linear-gradient(135deg,#00D9FF,#0099CC);color:#000;}
.btn-green{background:linear-gradient(135deg,#10B981,#059669);color:#000;}
.btn-red{background:linear-gradient(135deg,#EF4444,#DC2626);color:#fff;}
.btn-ghost{background:rgba(255,255,255,0.06);color:#fff;border:0.5px solid rgba(255,255,255,0.15);}
.btn-sm{padding:8px 14px;width:auto;font-size:12px;border-radius:10px;margin-bottom:0;}

/* INPUTS */
.inp{width:100%;padding:13px 14px;background:var(--card);border:0.5px solid rgba(255,255,255,0.12);border-radius:12px;color:#fff;font-size:15px;font-family:inherit;outline:none;margin-bottom:12px;transition:border-color 0.2s;}
.inp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,217,255,0.1);}
.sel{width:100%;padding:13px 14px;background:var(--card);border:0.5px solid rgba(255,255,255,0.12);border-radius:12px;color:#fff;font-size:15px;font-family:inherit;outline:none;margin-bottom:12px;appearance:none;-webkit-appearance:none;}
.lbl{font-size:10px;color:#9CA3AF;font-weight:700;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.8px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* MISC */
.sbar{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
.sfill{height:100%;border-radius:3px;transition:width 0.6s ease;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;}
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;margin:2px;}
.cy{background:rgba(16,185,129,0.12);color:#10B981;border:0.5px solid rgba(16,185,129,0.3);}
.cm{background:rgba(245,158,11,0.12);color:#F59E0B;border:0.5px solid rgba(245,158,11,0.3);}
.cn{background:rgba(239,68,68,0.12);color:#EF4444;border:0.5px solid rgba(239,68,68,0.3);}
.cw{background:rgba(255,255,255,0.05);color:#6B7280;border:0.5px solid var(--border);}

/* PLAYER ROW */
.pr{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.03);border-radius:12px;margin-bottom:6px;border:0.5px solid var(--border);cursor:pointer;transition:background 0.15s,border-color 0.15s;}
.pr:active{background:rgba(255,255,255,0.06);}

/* FUT CARD - Enhanced with glow effects */
.fut-card{border-radius:18px;padding:16px;width:185px;position:relative;overflow:hidden;transition:transform 0.2s;}
.fut-gold{background:linear-gradient(145deg,#1c2d1a,#0d1525);border:2px solid var(--gold);box-shadow:0 0 20px rgba(255,215,0,0.2),inset 0 0 20px rgba(255,215,0,0.03);}
.fut-silver{background:linear-gradient(145deg,#1e2535,#0d1525);border:2px solid #9CA3AF;box-shadow:0 0 15px rgba(156,163,175,0.15);}
.fut-bronze{background:linear-gradient(145deg,#2d1e12,#0d1525);border:2px solid #CD7F32;box-shadow:0 0 15px rgba(205,127,50,0.15);}
/* Gold shimmer animation */
.fut-gold::before{content:"";position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 30%,rgba(255,215,0,0.04) 50%,transparent 70%);animation:shimmer 3s infinite;pointer-events:none;}
.fut-silver::before{content:"";position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 30%,rgba(156,163,175,0.04) 50%,transparent 70%);animation:shimmer 4s infinite;pointer-events:none;}

/* PITCH */
.pitch{background:#0F4A3D;background-image:linear-gradient(rgba(255,255,255,0.04)1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.04)1px,transparent 1px);background-size:20px 20px;border:1px solid rgba(255,255,255,0.12);border-radius:12px;position:relative;height:240px;overflow:hidden;margin-bottom:10px;}
.pitch::before{content:"";position:absolute;top:50%;left:8%;right:8%;height:1px;background:rgba(255,255,255,0.15);}
.pitch::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border:1px solid rgba(255,255,255,0.15);border-radius:50%;}
.dot{position:absolute;transform:translate(-50%,-50%);width:44px;text-align:center;animation:dotAppear 0.4s ease forwards;}

/* LOADER */
.loader-ball{width:50px;height:50px;position:relative;animation:bounceBall 0.8s ease-in-out infinite alternate;}
.loader-ball::before{content:"⚽";font-size:40px;position:absolute;top:0;left:0;}

/* ANIMATIONS */
@keyframes shimmer{0%{transform:translateX(-100%) rotate(45deg);}100%{transform:translateX(100%) rotate(45deg);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes bounceBall{0%{transform:translateY(0) scale(1);}100%{transform:translateY(-20px) scale(0.95);}}
@keyframes dotAppear{0%{opacity:0;transform:translate(-50%,-50%) scale(0);}100%{opacity:1;transform:translate(-50%,-50%) scale(1);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,217,255,0.4);}50%{box-shadow:0 0 0 8px rgba(0,217,255,0);}}

.fade-in{animation:fadeIn 0.3s ease forwards;}
.slide-up{animation:slideUp 0.35s ease forwards;}

/* OVR Ring */
.ovr-ring{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.ovr-ring::after{content:"";position:absolute;inset:-3px;border-radius:50%;animation:pulse 2s infinite;}

/* Notification badge */
.notif-badge{position:absolute;top:-4px;right:-4px;width:18px;height:18px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;border:2px solid var(--bg);}
</style>
</head>

// ── SUPABASE API ──────────────────────────────────────
function sbReq(method,table,data,params){
  return new Promise(function(resolve,reject){
    var url=SB_URL+'/rest/v1/'+table;
    if(params) url+='?'+params;
    var opts={
      method:method,
      mode:'cors',
      headers:{
        'apikey':SB_KEY,
        'Authorization':'Bearer '+SB_KEY,
        'Content-Type':'application/json',
        'Prefer':'return=representation',
        'X-Client-Info':'rmm26'
      }
    };
    if(data) opts.body=JSON.stringify(data);
    fetch(url,opts).then(function(r){
      if(!r.ok) return r.text().then(function(t){
        reject(new Error('HTTP '+r.status+': '+t));
      });
      return r.text().then(function(t){resolve(t?JSON.parse(t):null);});
    }).catch(function(e){
      reject(new Error('Netzwerkfehler: '+e.message));
    });
  });
}

function calcMainStat(ratings, groupKey){
  var g=null,i;
  for(i=0;i<STAT_GROUPS.length;i++){if(STAT_GROUPS[i].key===groupKey){g=STAT_GROUPS[i];break;}}
  if(!g||!ratings)return 50;
  var total=0,count=0,si;
  for(si=0;si<g.subs.length;si++){
    var v=ratings[g.subs[si].key];
    if(v){total+=parseInt(v);count++;}
  }
  return count>0?Math.round(total/count):50;
}

function getAvgStats(u){
  var rats=u.ratings||{},keys=Object.keys(rats),n=keys.length;
  if(n===0)return{pac:50,sho:50,pas:50,dri:50,def:50,phy:50,n:0,schwachfuss:1,skills:1};
  var s={pac:0,sho:0,pas:0,dri:0,def:0,phy:0,schwachfuss:0,skills:0};
  var gi,rater;
  for(var i=0;i<keys.length;i++){
    rater=rats[keys[i]];
    for(gi=0;gi<STAT_GROUPS.length;gi++){
      s[STAT_GROUPS[gi].key]+=calcMainStat(rater,STAT_GROUPS[gi].key);
    }
    s.schwachfuss+=parseInt(rater.schwachfuss||1);
    s.skills+=parseInt(rater.skills||1);
  }
  return{
    pac:Math.round(s.pac/n),sho:Math.round(s.sho/n),pas:Math.round(s.pas/n),
    dri:Math.round(s.dri/n),def:Math.round(s.def/n),phy:Math.round(s.phy/n),
    schwachfuss:Math.round(s.schwachfuss/n),skills:Math.round(s.skills/n),n:n
  };
}
function calcOvr(u){
  var s=getAvgStats(u);if(s.n===0)return'?';
  var w=u.pos==='GK'?[0.10,0.05,0.15,0.10,0.35,0.25]:u.pos==='CB'||u.pos==='LB'||u.pos==='RB'?[0.15,0.10,0.20,0.10,0.30,0.15]:u.pos==='CDM'||u.pos==='CM'?[0.20,0.15,0.25,0.20,0.10,0.10]:u.pos==='CAM'||u.pos==='LW'||u.pos==='RW'?[0.25,0.20,0.25,0.20,0.05,0.05]:[0.25,0.30,0.15,0.20,0.05,0.05];
  var vals=[s.pac,s.sho,s.pas,s.dri,s.def,s.phy],t=0;
  for(var i=0;i<6;i++)t+=vals[i]*w[i];
  return Math.min(99,Math.max(40,Math.round(t)));
}

window.updR=function(el){
  var stat=el.getAttribute('data-rstat'),group=el.getAttribute('data-group'),val=parseInt(el.value);
  el.style.background='linear-gradient(90deg,'+statBg(val)+' '+val+'%,rgba(255,255,255,0.08) 0%)';
  var sv=document.getElementById('rv_'+stat);
  if(sv){sv.textContent=val;sv.style.color=statColor(val);}
  // Recalculate main group stat
  if(group){
    var sliders=document.querySelectorAll('[data-group="'+group+'"]'),total=0,count=0,si;
    for(si=0;si<sliders.length;si++){total+=parseInt(sliders[si].value);count++;}
    var mainEl=document.getElementById('mg_'+group);
    if(mainEl&&count>0){var avg=Math.round(total/count);mainEl.textContent=avg;mainEl.style.color=statColor(avg);}
  }
};

function shuf(a){var r=a.slice(),i,j,t;for(i=r.length-1;i>0;i--){j=Math.floor(Math.random()*(i+1));t=r[i];r[i]=r[j];r[j]=t;}return r;}
function ovrNum(u){var o=calcOvr(u);return o==='?'?50:o;}
function fitScore(u,fpos){var r=RL[fpos],s=getAvgStats(u),score=0;if(r==='GK')score=s.def*0.3+s.phy*0.4+s.pac*0.15+s.pas*0.15;else if(r==='DEF')score=s.def*0.45+s.phy*0.3+s.pac*0.15+s.pas*0.1;else if(r==='MF')score=s.pas*0.35+s.dri*0.25+s.phy*0.2+s.def*0.2;else score=s.sho*0.4+s.pac*0.3+s.dri*0.2+s.pas*0.1;if(POS_ROLE[u.pos]===r)score+=10;return score;}
function pickFm(n){
  var keys=Object.keys(FM),i,d;
  // First find all formations that exactly match team size
  var exact=keys.filter(function(k){return FM[k].pos.length===n;});
  if(exact.length>0) return exact[Math.floor(Math.random()*exact.length)];
  // Otherwise find closest
  var best=keys[0],diff=999;
  for(i=0;i<keys.length;i++){d=Math.abs(FM[keys[i]].pos.length-n);if(d<diff){diff=d;best=keys[i];}}
  var cl=keys.filter(function(k){return Math.abs(FM[k].pos.length-n)<=diff;});
  return cl[Math.floor(Math.random()*cl.length)];
}
function assignFM(list,fk){var f=FM[fk],res=[],used={},i,j,best,bs,s;for(i=0;i<Math.min(f.pos.length,list.length);i++){best=-1;bs=-1;for(j=0;j<list.length;j++){if(used[j])continue;s=fitScore(list[j],f.pos[i]);if(s>bs){bs=s;best=j;}}if(best===-1)break;used[best]=true;var p=list[best];res.push({id:p.id,fn:p.fn,ln:p.ln,nick:p.nick||'',short:(p.fn?p.fn[0]:'?')+(p.ln?p.ln[0]||'':''),shirt:p.shirt||'',pos:p.pos,avatar:p.avatar||null,ovr:ovrNum(p),fp:f.pos[i],fc:f.c[i]});}return res;}
function splitFair(list){var s=list.slice().sort(function(a,b){return ovrNum(b)-ovrNum(a);});var a=[],b=[],i;for(i=0;i<s.length;i++){if(Math.floor(i/2)%2===0){i%2===0?a.push(s[i]):b.push(s[i]);}else{i%2===0?b.push(s[i]):a.push(s[i]);}}return[a,b];}
function buildTeams(list){var ab=splitFair(shuf(list));var fA=pickFm(ab[0].length),fB=pickFm(ab[1].length);if(fA===fB){var keys=Object.keys(FM).filter(function(k){return k!==fA;});if(keys.length)fB=keys[Math.floor(Math.random()*keys.length)];}return{A:{pl:assignFM(ab[0],fA),fm:fA},B:{pl:assignFM(ab[1],fB),fm:fB}};}
function mkPitch(team,col,tc){

function sEvents(){

    inEv=APP.me&&parts.indexOf(APP.me.id)!==-1;
    full=parts.length>=ev.max_players;
    pct=Math.round(parts.length/ev.max_players*100);
    col=parts.length>=12?'var(--green)':'var(--amber)';
    rows+='<div class="card" style="margin-bottom:12px;">'
      +'<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px;">'
      +'<div><p style="font-size:16px;font-weight:700;">'+ev.date+'</p>'
      +'<p style="font-size:12px;color:#9CA3AF;margin-top:3px;">'+ev.time+' Uhr &middot; '+ev.location+'</p></div>'
      +(full?'<span style="font-size:22px;">&#128274;</span>':'<span style="color:'+col+';font-size:13px;font-weight:700;">'+parts.length+'/'+ev.max_players+'</span>')
      +'</div>'
      +'<div class="sbar" style="margin-bottom:8px;"><div class="sfill" style="width:'+pct+'%;background:'+col+';"></div></div>'
      +'<div style="display:flex;gap:8px;">'
      +(APP.me
        ?(inEv
          ?'<button class="btn btn-red btn-sm" data-leaveev="'+ev.id+'" style="flex:1;">Abmelden</button>'
          :(full
            ?'<button class="btn btn-ghost btn-sm" data-waitlist="'+ev.id+'" style="flex:1;">Warteliste ('+(ev.waitlist?ev.waitlist.length:0)+')</button>'
            :'<button class="btn btn-green btn-sm" data-joinev="'+ev.id+'" style="flex:1;">&#10003; Zusagen</button>'))

    +'</div>'+mkBN('events')+'</div>';

function sEventDetail(evId){
  var i,ev=null;
  for(i=0;i<APP.events.length;i++){if(APP.events[i].id===parseInt(evId)){ev=APP.events[i];break;}}
  if(!ev){go('events');return'';}
  var parts=ev.participants||[];
  var inEv=APP.me&&parts.indexOf(APP.me.id)!==-1;
  var full=parts.length>=ev.max_players;
  var rows='',p;
  for(i=0;i<parts.length;i++){
    p=getUser(parts[i]);if(!p)continue;
    rows+='<div class="pr" data-go="pd_'+p.id+'">'
      +'<div style="width:26px;height:26px;border-radius:50%;background:var(--cyan);color:#000;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;">'+(p.shirt||i+1)+'</div>'
      +(p.avatar?'<img src="'+p.avatar+'" style="width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;"/>':'<div style="width:34px;height:34px;border-radius:50%;background:#1e2d4a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--cyan);flex-shrink:0;">'+(p.fn?p.fn[0]:'?')+(p.ln?p.ln[0]||'':'')+'</div>')
      +'<div style="flex:1;"><p style="font-size:13px;font-weight:600;">'+(p.nick||p.fn+' '+p.ln)+'</p>'
      +'<p style="font-size:10px;color:#9CA3AF;">'+p.pos+'</p></div>'
      +(i===0?'<i class="ti ti-crown" style="color:var(--gold);font-size:16px;"></i>':'')
      +'</div>';
  }
  var wait=ev.waitlist||[];
  var wRows=wait.map(function(uid,wi){var p=getUser(uid);return p?'<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(245,158,11,0.07);border-radius:10px;margin-bottom:5px;"><span style="font-size:10px;color:var(--amber);font-weight:700;">'+(wi+1)+'.</span><span style="font-size:13px;">'+(p.nick||p.fn+' '+p.ln)+'</span></div>':'';}).join('');
  var statusMsg=parts.length>=12
    ?'<div style="background:rgba(16,185,129,0.1);border:0.5px solid rgba(16,185,129,0.3);border-radius:10px;padding:10px 14px;margin-bottom:14px;"><p style="font-size:12px;color:var(--green);font-weight:700;">&#10003; Spiel findet statt!</p></div>'
    :'<div style="background:rgba(245,158,11,0.08);border:0.5px solid rgba(245,158,11,0.25);border-radius:10px;padding:10px 14px;margin-bottom:14px;"><p style="font-size:12px;color:var(--amber);">Noch '+(12-parts.length)+' Spieler benoetigt</p></div>';
  return '<div>'+mkTB(ev.date,'events',isAdmin()?'Bearbeiten':null,isAdmin()?'editEvent_'+ev.id:null)
    +'<div style="padding:16px 18px 90px;">'
    +'<p style="font-size:13px;color:#9CA3AF;margin-bottom:12px;">'+ev.time+' Uhr &middot; &#128205; '+ev.location+'</p>'
    +'<div class="sbar" style="margin-bottom:6px;"><div class="sfill" style="width:'+Math.round(parts.length/ev.max_players*100)+'%;background:'+(parts.length>=12?'var(--green)':'var(--amber)')+'"></div></div>'
    +'<p style="font-size:11px;color:#9CA3AF;margin-bottom:14px;">'+parts.length+'/'+ev.max_players+' Spieler'+(full?' &#128274;':'')+'</p>'
    +statusMsg
    +(APP.me
      ?(inEv?'<button class="btn btn-red" data-leaveev="'+ev.id+'">Abmelden</button>'
        :(full?'<button class="btn btn-ghost" data-waitlist="'+ev.id+'">Warteliste ('+(wait.length)+')</button>'
          :'<button class="btn btn-cyan" data-joinev="'+ev.id+'">&#10003; Jetzt zusagen</button>'))
      :'<button class="btn btn-ghost" data-go="login">Einloggen</button>')
    +(parts.length>0?'<p style="font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;">Angemeldet ('+parts.length+')</p>'+rows:'')
    +(wRows?'<p style="font-size:10px;color:var(--amber);text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px;">Warteliste</p>'+wRows:'')
    +(parts.length>=4?'<button class="btn btn-ghost" data-go="teams" style="margin-top:12px;">&#9917; Teams generieren</button>':'')
    +'</div>'+mkBN('events')+'</div>';
}

  var pi,i,poll,yIds,mIds,nIds,wIds,votes,uid,v,voted,pct,myVote,out;

    +'<div style="padding:16px 18px 90px;">'
    +'<button class="btn btn-gold" data-go="newpoll" style="margin-bottom:18px;">+ Termin vorschlagen</button>';
  if(APP.polls.length===0){out+='<div class="card" style="text-align:center;padding:40px;"><p style="font-size:32px;margin-bottom:12px;">&#128403;</p><p style="color:#9CA3AF;">Noch keine Abstimmungen.</p></div>';}

    myVote=APP.me?votes[APP.me.id]:null;

    out+='<div style="margin-bottom:16px;border-radius:18px;overflow:hidden;border:1px solid '+pcol+';background:linear-gradient(145deg,#131A2D,#0d1525);">';
    // Header with gradient
    out+='<div style="padding:16px 16px 12px;background:linear-gradient(135deg,rgba(255,255,255,0.04),transparent);">';
    out+='<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;">';
    out+='<div>';
    out+='<p style="font-size:20px;font-weight:800;letter-spacing:-0.5px;">'+poll.date+'</p>';
    out+='<p style="font-size:13px;color:#9CA3AF;margin-top:3px;">'+poll.time+' Uhr &middot; &#128205; '+poll.location+'</p>';
    out+='<p style="font-size:10px;color:#4B5563;margin-top:2px;">von '+poll.by+'</p>';

    out+=(isAdmin()?'<span data-go="editPoll_'+poll.id+'" style="font-size:10px;color:var(--cyan);cursor:pointer;font-weight:700;">&#9998; Edit</span>':'');
    out+='</div></div>';
    // Big vote count display
    out+='<div style="display:flex;gap:8px;margin-bottom:10px;">';
    out+='<div style="flex:1;text-align:center;padding:10px;border-radius:10px;background:rgba(16,185,129,0.1);border:0.5px solid rgba(16,185,129,0.25);">'
      +'<p style="font-size:22px;font-weight:800;color:var(--green);">'+yIds.length+'</p>'
      +'<p style="font-size:10px;color:#9CA3AF;">Ja</p></div>';
    out+='<div style="flex:1;text-align:center;padding:10px;border-radius:10px;background:rgba(245,158,11,0.1);border:0.5px solid rgba(245,158,11,0.25);">'
      +'<p style="font-size:22px;font-weight:800;color:var(--amber);">'+mIds.length+'</p>'
      +'<p style="font-size:10px;color:#9CA3AF;">Vlt</p></div>';
    out+='<div style="flex:1;text-align:center;padding:10px;border-radius:10px;background:rgba(239,68,68,0.1);border:0.5px solid rgba(239,68,68,0.25);">'
      +'<p style="font-size:22px;font-weight:800;color:var(--red);">'+nIds.length+'</p>'
      +'<p style="font-size:10px;color:#9CA3AF;">Nein</p></div>';

    // Action bar
    out+='<div style="border-top:0.5px solid var(--border);display:flex;gap:0;">';

    out+='<button data-vote="maybe" data-pid="'+poll.id+'" style="flex:1;padding:14px 4px;background:'+(myVote==='maybe'?'rgba(245,158,11,0.2)':'transparent')+';color:'+(myVote==='maybe'?'var(--amber)':'#6B7280')+';font-size:13px;font-weight:700;border:none;cursor:pointer;border-right:0.5px solid var(--border);">? Vlt</button>';
    out+='<button data-vote="no" data-pid="'+poll.id+'" style="flex:1;padding:14px 4px;background:'+(myVote==='no'?'rgba(239,68,68,0.2)':'transparent')+';color:'+(myVote==='no'?'var(--red)':'#6B7280')+';font-size:13px;font-weight:700;border:none;cursor:pointer;">&#10005; Nein</button>';

    if(mIds.length>0){out+='<p style="font-size:10px;color:var(--amber);font-weight:600;margin-bottom:4px;">? Vielleicht</p><div style="margin-bottom:8px;">';for(i=0;i<mIds.length;i++)out+='<span class="chip cm">'+getName(mIds[i])+'</span>';out+='</div>';}
    if(nIds.length>0){out+='<p style="font-size:10px;color:var(--red);font-weight:600;margin-bottom:4px;">&#10005; Absagen</p><div style="margin-bottom:8px;">';for(i=0;i<nIds.length;i++)out+='<span class="chip cn">'+getName(nIds[i])+'</span>';out+='</div>';}
    if(wIds.length>0){out+='<p style="font-size:10px;color:#4B5563;font-weight:600;margin-bottom:4px;">&#8987; Noch nicht</p><div>';for(i=0;i<wIds.length;i++)out+='<span class="chip cw">'+getName(wIds[i])+'</span>';out+='</div>';}
    out+='</div>';
    if(yIds.length>=6)out+='<button class="btn btn-green" style="margin-top:8px;" data-fixpoll="'+poll.id+'">&#127881; Spiel fixieren ('+yIds.length+' Zusagen)</button>';
    out+='</div></div>';
  }
  return out+'</div>'+mkBN('voting')+'</div>';
}

function fmtCountdown(dateStr,timeStr){
  // Parse date like "Fr, 16. Mai 2026" + time "20:00"
  try{
    var months={'Jan':0,'Feb':1,'Mrz':2,'Mar':2,'Apr':3,'Mai':4,'Jun':5,'Jul':6,'Aug':7,'Sep':8,'Okt':9,'Nov':10,'Dez':11};
    var parts=dateStr.replace(/[.,]/g,'').split(' ');
    var day=parseInt(parts[1]);
    var month=months[parts[2]]||0;
    var year=parseInt(parts[3])||new Date().getFullYear();
    var tparts=(timeStr||'20:00').split(':');
    var evDate=new Date(year,month,day,parseInt(tparts[0]),parseInt(tparts[1]));
    var now=new Date();
    var diff=evDate-now;
    if(diff<0) return '<span style="color:var(--red);font-size:11px;">Vorbei</span>';
    var days=Math.floor(diff/86400000);
    var hours=Math.floor((diff%86400000)/3600000);
    var mins=Math.floor((diff%3600000)/60000);
    if(days>0) return '<span style="color:var(--cyan);font-size:11px;font-weight:700;">in '+days+'T '+hours+'Std</span>';
    if(hours>0) return '<span style="color:var(--amber);font-size:11px;font-weight:700;">in '+hours+'Std '+mins+'Min</span>';
    return '<span style="color:var(--green);font-size:11px;font-weight:700;animation:pulse 1s infinite;">JETZT!</span>';
  }catch(e){return '';}
}

function sMOTM(){
  var out='<div>'+mkTB('Man of the Match','home')

    +'<div style="background:rgba(255,215,0,0.08);border:0.5px solid rgba(255,215,0,0.2);border-radius:12px;padding:12px 14px;margin-bottom:18px;">'

    for(vv in motmV){var vf=motmV[vv];voteCounts[vf]=(voteCounts[vf]||0)+1;}

    if(APP.me&&parts.indexOf(APP.me.id)!==-1){
      out+='<p style="font-size:10px;color:#9CA3AF;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">Deine Stimme:</p>';
      out+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">';
      for(var pi=0;pi<parts.length;pi++){
        var p=getUser(parts[pi]);if(!p||p.id===APP.me.id)continue;

        var pVotes=voteCounts[p.id]||0;
        out+='<button data-motm="'+ev.id+'_'+p.id+'" style="display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid '+(isVoted?'var(--gold)':'rgba(255,255,255,0.1)')+';background:'+(isVoted?'rgba(255,215,0,0.15)':'rgba(255,255,255,0.03)')+';color:'+(isVoted?'var(--gold)':'#9CA3AF')+';text-align:left;">'
          +(p.avatar?'<img src="'+p.avatar+'" style="width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;"/>':'<div style="width:24px;height:24px;border-radius:50%;background:#1e2d4a;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--cyan);flex-shrink:0;">'+(p.fn?p.fn[0]:'?')+'</div>')

      }
      out+='</div>';
    }else if(!APP.me){out+='<p style="font-size:12px;color:#6B7280;">Einloggen um abzustimmen.</p>';}
    else{out+='<p style="font-size:12px;color:#6B7280;">Nur Teilnehmer koennen abstimmen.</p>';}

// ── PUSH NOTIFICATIONS ───────────────────────────────────────────────────
var OS_APP_ID='a3214c58-da5e-4a1c-bb6b-f89674906d15';
var OS_API='https://onesignal.com/api/v1/notifications';

function sendPush(title, msg){
  try{
    fetch(OS_API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        app_id:OS_APP_ID,
        included_segments:['All'],
        headings:{en:title,de:title},
        contents:{en:msg,de:msg},
        chrome_web_icon:'https://raw.githubusercontent.com/schekib28/real-match-manager/main/icon.png',
        small_icon:'https://raw.githubusercontent.com/schekib28/real-match-manager/main/icon.png'
      })
    });
  }catch(e){console.log('Push error:',e);}
}


// ── ROUTER ────────────────────────────────────────────
function go(name){
  try{
    var el=document.getElementById('scr');if(!el)return;
    var html='';
    if(name==='splash')        html=sSplash();
    else if(name==='login')    html=sLogin();
    else if(name==='register') html=sRegister();
    else if(name==='register2')html=sRegister2();
    else if(name==='home')     html=sHome();
    else if(name==='events')   html=sEvents();
    else if(name==='editTeams') html=sEditTeams();
    else if(name.indexOf('editEvent_')===0) html=sEditEvent(name.replace('editEvent_',''));
    else if(name.indexOf('editPoll_')===0)  html=sEditPoll(name.replace('editPoll_',''));
    else if(name==='voting')   html=sVoting();
    else if(name==='newpoll')  html=sNewPoll();
    else if(name==='teams')    html=sTeams();
    else if(name==='rangliste')html=sRangliste();
    else if(name==='motm')     html=sMOTM();
    else if(name==='players')  html=sPlayers();
    else if(name==='profile')  html=sProfile();
    else if(name==='editProfile') html=sEditProfile();
    else if(name==='logout')   {clearSession();APP.me=null;html=sSplash();}
    else if(name.indexOf('event_')===0)html=sEventDetail(name.replace('event_',''));
    else if(name.indexOf('pd_')===0)   html=sPlayerDetail(parseInt(name.replace('pd_','')));
    else html=sHome();
    el.innerHTML=html;el.scrollTop=0;
    bindButtons();
  }catch(e){
    var el2=document.getElementById('scr');
    if(el2)el2.innerHTML='<div style="padding:40px;"><p style="color:var(--red);font-weight:700;margin-bottom:8px;">Fehler</p><p style="color:#9CA3AF;font-size:12px;">'+e.message+'</p><button data-go="home" style="margin-top:16px;padding:10px 20px;background:var(--cyan);color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;">Zurueck</button></div>';
    bindButtons();
  }
}

// ── BIND BUTTONS ──────────────────────────────────────
function bindButtons(){
  // Login
  var liBtn=document.getElementById('liBtn');
  if(liBtn) liBtn.addEventListener('click',function(){
    var fn=document.getElementById('liFn'),ln=document.getElementById('liLn');
    if(!fn||!fn.value.trim()){alert('Vorname eingeben!');return;}
    var fnV=fn.value.trim().toLowerCase(),lnV=ln&&ln.value?ln.value.trim().toLowerCase():'';
    var found=null;
    for(var i=0;i<APP.users.length;i++){
      if(APP.users[i].fn.toLowerCase()===fnV&&APP.users[i].ln.toLowerCase()===lnV){found=APP.users[i];break;}
    }
    if(!found){alert('Kein Spieler mit diesem Namen gefunden!');return;}
    APP.me=found;
    var stay=document.getElementById('stayCheck');
    if(stay&&stay.checked)saveSession();
    go('home');
  });

  // Register step 1
  var r1=document.getElementById('reg1Btn');
  if(r1) r1.addEventListener('click',function(){
    var fn=document.getElementById('rFn'),ln=document.getElementById('rLn');
    if(!fn||!fn.value.trim()){alert('Vorname eingeben!');return;}
    var fnV=fn.value.trim(),lnV=ln&&ln.value?ln.value.trim():'';
    for(var i=0;i<APP.users.length;i++){
      if(APP.users[i].fn.toLowerCase()===fnV.toLowerCase()&&APP.users[i].ln.toLowerCase()===lnV.toLowerCase()){
        alert('Dieser Name ist bereits registriert!');return;
      }
    }
    var nick=document.getElementById('rNick'),shirt=document.getElementById('rShirt');
    var age=document.getElementById('rAge'),h=document.getElementById('rHeight'),w=document.getElementById('rWeight');
    var nat=document.getElementById('rNat');
    RF.fn=fnV;RF.ln=lnV;
    RF.nick=nick?nick.value.trim():'';RF.shirt=shirt?parseInt(shirt.value)||10:10;
    RF.age=age?age.value:'';RF.height=h?h.value:'';RF.weight=w?w.value:'';
    RF.nat=nat?nat.value.trim():'';
    go('register2');
  });

  // Save profile
  var sp=document.getElementById('saveBtn');
  if(sp) sp.addEventListener('click',function(){
    var newUser={fn:RF.fn,ln:RF.ln,nick:RF.nick,shirt:RF.shirt,age:RF.age,height:RF.height,weight:RF.weight,nat:RF.nat,pos:RF.pos,foot:RF.foot,avatar:null,ratings:{}};
    showLoader();
    dbInsert('users',newUser).then(function(result){
      var u=result&&result[0]?result[0]:result;
      APP.users.push(u);APP.me=u;saveSession();
      loadAll(function(){go('home');});
    }).catch(function(e){alert('Fehler beim Speichern: '+e.message);go('home');});
  });

  // Create poll
  var cp=document.getElementById('createPollBtn');
  if(cp) cp.addEventListener('click',function(){
    if(!APP.me){alert('Bitte einloggen!');return;}
    var d=document.getElementById('pDate'),t=document.getElementById('pTime');
    var l=document.getElementById('pLoc'),mx=document.getElementById('pMax');
    if(!d||!d.value){alert('Datum auswaehlen!');return;}
    if(!t||!t.value){alert('Uhrzeit angeben!');return;}
    var poll={date:fmtDate(d.value),time:t.value,location:(l&&l.value)||'TBA',by:APP.me.nick||APP.me.fn,votes:{}};
    showLoader();
    dbInsert('polls',poll).then(function(){
      sendPush('Neuer Termin vorgeschlagen &#128197;', poll.date+' | '+poll.time+' Uhr | '+poll.location);
      loadAll(function(){go('voting');});
    }).catch(function(e){alert('Fehler: '+e.message);go('voting');});
  });

  // Rating submit
  var sr=document.getElementById('submitRatingBtn');
  if(sr) sr.addEventListener('click',function(){
    var uid=parseInt(sr.getAttribute('data-uid'));
    var u=getUser(uid);if(!u||!APP.me)return;
    var rating={};
    // Collect all sub-stats
    var allSliders=document.querySelectorAll('[data-rstat]'),sli;
    for(sli=0;sli<allSliders.length;sli++){
      rating[allSliders[sli].getAttribute('data-rstat')]=parseInt(allSliders[sli].value)||70;
    }
    // Collect schwachfuss and skills stars
    var sfSelected=document.querySelector('[data-sfval][style*="var(--gold)"]');
    var allSFBtns=document.querySelectorAll('[data-sfval]'),sfMax=1,sfi2;
    for(sfi2=0;sfi2<allSFBtns.length;sfi2++){
      if(allSFBtns[sfi2].style.color.indexOf('gold')!==-1||allSFBtns[sfi2].style.color==='var(--gold)')
        sfMax=Math.max(sfMax,parseInt(allSFBtns[sfi2].getAttribute('data-sfval')));
    }
    rating.schwachfuss=sfMax;
    var allSKBtns=document.querySelectorAll('[data-skval]'),skMax=1,ski2;
    for(ski2=0;ski2<allSKBtns.length;ski2++){
      if(allSKBtns[ski2].style.color.indexOf('cyan')!==-1||allSKBtns[ski2].style.color==='var(--cyan)')
        skMax=Math.max(skMax,parseInt(allSKBtns[ski2].getAttribute('data-skval')));
    }
    rating.skills=skMax;
    var newRatings=JSON.parse(JSON.stringify(u.ratings||{}));
    newRatings[APP.me.id]=rating;
    showLoader();
    dbUpdate('users',uid,{ratings:newRatings}).then(function(){
      loadAll(function(){go('pd_'+uid);});
    }).catch(function(e){alert('Fehler: '+e.message);go('pd_'+uid);});
  });

  // Save poll edit
  var spBtn=document.getElementById('savePollBtn');
  if(spBtn) spBtn.addEventListener('click',function(){
    if(!isAdmin()){return;}
    var pid=document.getElementById('pEditId');
    if(!pid)return;
    var pollId=parseInt(pid.value);
    var d=document.getElementById('pEditDate'),t=document.getElementById('pEditTime'),l=document.getElementById('pEditLoc');
    if(!d||!d.value.trim()){alert('Datum eingeben!');return;}
    showLoader();
    dbUpdate('polls',pollId,{date:d.value.trim(),time:(t&&t.value)||'20:00',location:(l&&l.value.trim())||'TBA'})
      .then(function(){loadAll(function(){go('voting');});})
      .catch(function(e){alert('Fehler: '+e.message);});
  });

  // Delete poll
  var dpBtn=document.getElementById('deletePollBtn');
  if(dpBtn) dpBtn.addEventListener('click',function(){
    if(!isAdmin()){return;}
    var pid=document.getElementById('pEditId');
    if(!pid)return;
    var pollId=parseInt(pid.value);
    if(!confirm('Abstimmung wirklich loeschen?'))return;
    showLoader();
    dbDelete('polls',pollId).then(function(){loadAll(function(){go('voting');});})
      .catch(function(e){alert('Fehler: '+e.message);});
  });

  // Save event edit
  var seBtn=document.getElementById('saveEventBtn');
  if(seBtn) seBtn.addEventListener('click',function(){
    if(!isAdmin()){alert('Keine Berechtigung!');return;}
    var hiddenId=document.getElementById('eEvId');
    if(!hiddenId){alert('Fehler: ID nicht gefunden');return;}
    var evid=parseInt(hiddenId.value);
    var d=document.getElementById('eDateVal'),t=document.getElementById('eTimeVal');
    var l=document.getElementById('eLocVal'),mx=document.getElementById('eMaxVal');
    if(!d||!d.value.trim()){alert('Datum eingeben!');return;}
    if(!t||!t.value.trim()){alert('Uhrzeit eingeben!');return;}
    if(!l||!l.value.trim()){alert('Ort eingeben!');return;}
    showLoader();
    dbUpdate('events',evid,{
      date:d.value.trim(),
      time:t.value.trim(),
      location:l.value.trim(),
      max_players:parseInt((mx&&mx.value)||14)
    }).then(function(){
      loadAll(function(){go('events');});
    }).catch(function(e){
      var el2=document.getElementById('scr');
      if(el2)el2.innerHTML='<div style="padding:40px;"><p style="color:var(--red);font-weight:700;">Fehler beim Speichern</p><p style="color:#9CA3AF;margin-top:8px;font-size:12px;">'+e.message+'</p><button data-go="events" style="margin-top:16px;padding:10px 20px;background:var(--cyan);color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;">Zurueck</button></div>';
      bindButtons();
    });
  });

  // Delete event
  var deBtn=document.getElementById('deleteEventBtn');
  if(deBtn) deBtn.addEventListener('click',function(){
    if(!isAdmin()){alert('Keine Berechtigung!');return;}
    var hiddenId2=document.getElementById('eEvId');
    if(!hiddenId2){alert('Fehler: ID nicht gefunden');return;}
    var evid=parseInt(hiddenId2.value);
    if(!confirm('Termin wirklich loeschen? Alle Anmeldungen gehen verloren!')) return;
    showLoader();
    dbDelete('events',evid).then(function(){
      loadAll(function(){go('events');});
    }).catch(function(e){
      alert('Fehler beim Loeschen: '+e.message);
      go('events');
    });
  });

  // Save profile edit
  var epBtn=document.getElementById('saveProfileBtn');
  if(epBtn) epBtn.addEventListener('click',function(){
    if(!APP.me)return;
    var fn=document.getElementById('epFn'),ln=document.getElementById('epLn');
    var nick=document.getElementById('epNick'),shirt=document.getElementById('epShirt');
    var age=document.getElementById('epAge'),h=document.getElementById('epHeight'),w=document.getElementById('epWeight');
    var nat=document.getElementById('epNat');

      shirt:shirt?parseInt(shirt.value)||10:10,age:age?age.value:'',height:h?h.value:'',
      weight:w?w.value:'',nat:nat?nat.value.trim():''};
    // Get selected position
    var posEl=document.querySelector('[data-epos].active-pos')||document.querySelector('[data-epos][style*="var(--gold)"]');
    if(posEl) updates.pos=posEl.getAttribute('data-epos');
    var altEl=document.querySelector('[data-ealtpos][style*="var(--cyan)"]');
    if(altEl) updates.altPos=altEl.getAttribute('data-ealtpos');
    showLoader();
    dbUpdate('users',APP.me.id,updates).then(function(){
      loadAll(function(){go('profile');});
    }).catch(function(e){alert('Fehler: '+e.message);go('profile');});
  });

  // Send comment
  var scBtn=document.getElementById('sendCommentBtn');
  if(scBtn) scBtn.addEventListener('click',function(){
    if(!APP.me)return;
    var evid=parseInt(scBtn.getAttribute('data-evid'));
    var inp=document.getElementById('commentInput');
    if(!inp||!inp.value.trim())return;
    var text=inp.value.trim();
    var ev=null,i;
    for(i=0;i<APP.events.length;i++){if(APP.events[i].id===evid){ev=APP.events[i];break;}}
    if(!ev)return;
    var comments=JSON.parse(JSON.stringify(ev.comments||[]));
    comments.push({userId:APP.me.id,userName:APP.me.nick||APP.me.fn,text:text,ts:Date.now()});
    dbUpdate('events',evid,{comments:comments}).then(function(){
      loadAll(function(){go('event_'+evid);});
    });
  });

  // Avatar
  var cab=document.getElementById('changeAvatarBtn'),ai=document.getElementById('avatarInput');
  if(cab&&ai){
    cab.addEventListener('click',function(){ai.click();});
    ai.addEventListener('change',function(){
      var file=ai.files[0];if(!file)return;
      // Compress avatar before upload
      var reader=new FileReader();
      reader.onload=function(e){
        var img=new Image();
        img.onload=function(){
          var canvas=document.createElement('canvas');
          var MAX=400;
          var ratio=Math.min(MAX/img.width,MAX/img.height);
          canvas.width=img.width*ratio;canvas.height=img.height*ratio;
          canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
          var compressed=canvas.toDataURL('image/jpeg',0.7);
          if(APP.me){
            showLoader();
            dbUpdate('users',APP.me.id,{avatar:compressed}).then(function(){
              loadAll(function(){go('profile');});
            }).catch(function(){go('profile');});
          }
        };
        img.src=e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }
}

// ── PERSISTENT CLICK HANDLER ──────────────────────────
document.getElementById('scr').addEventListener('click',function(e){
  var scr=document.getElementById('scr'),el=e.target;
  while(el&&el!==scr){
    if(el.getAttribute('data-go')){go(el.getAttribute('data-go'));return;}

    if(el.getAttribute('data-epos')){
      var allEP=scr.querySelectorAll('[data-epos]'),epi;
      for(epi=0;epi<allEP.length;epi++){allEP[epi].style.color='#9CA3AF';allEP[epi].style.borderColor='rgba(255,255,255,0.1)';allEP[epi].style.background='rgba(255,255,255,0.03)';}
      el.style.color='var(--gold)';el.style.borderColor='var(--gold)';el.style.background='rgba(255,215,0,0.15)';
      return;
    }
    if(el.getAttribute('data-ealtpos')){
      var allEA=scr.querySelectorAll('[data-ealtpos]'),eai;
      for(eai=0;eai<allEA.length;eai++){allEA[eai].style.color='#9CA3AF';allEA[eai].style.borderColor='rgba(255,255,255,0.1)';allEA[eai].style.background='rgba(255,255,255,0.03)';}
      el.style.color='var(--cyan)';el.style.borderColor='var(--cyan)';el.style.background='rgba(0,217,255,0.1)';
      return;
    }
    if(el.getAttribute('data-sfval')){
      var sfv=parseInt(el.getAttribute('data-sfval'));
      var allSF=scr.querySelectorAll('[data-sfval]'),sfi;
      for(sfi=0;sfi<allSF.length;sfi++){
        var sv2=parseInt(allSF[sfi].getAttribute('data-sfval'));
        allSF[sfi].style.borderColor=sv2<=sfv?'var(--gold)':'rgba(255,255,255,0.1)';
        allSF[sfi].style.background=sv2<=sfv?'rgba(255,215,0,0.15)':'rgba(255,255,255,0.03)';
        allSF[sfi].style.color=sv2<=sfv?'var(--gold)':'#6B7280';
      }
      return;
    }
    if(el.getAttribute('data-skval')){
      var skv=parseInt(el.getAttribute('data-skval'));
      var allSK=scr.querySelectorAll('[data-skval]'),ski;
      for(ski=0;ski<allSK.length;ski++){
        var sv3=parseInt(allSK[ski].getAttribute('data-skval'));
        allSK[ski].style.borderColor=sv3<=skv?'var(--cyan)':'rgba(255,255,255,0.1)';
        allSK[ski].style.background=sv3<=skv?'rgba(0,217,255,0.1)':'rgba(255,255,255,0.03)';
        allSK[ski].style.color=sv3<=skv?'var(--cyan)':'#6B7280';
      }
      return;
    }
    if(el.getAttribute('data-pos2')){
      var allP=scr.querySelectorAll('[data-pos2]'),pi;
      for(pi=0;pi<allP.length;pi++){allP[pi].style.color='#9CA3AF';allP[pi].style.borderColor='rgba(255,255,255,0.1)';allP[pi].style.background='rgba(255,255,255,0.03)';}
      el.style.color='var(--gold)';el.style.borderColor='var(--gold)';el.style.background='rgba(255,215,0,0.15)';
      RF.pos=el.getAttribute('data-pos2');return;
    }
    if(el.getAttribute('data-foot2')){
      var allF=scr.querySelectorAll('[data-foot2]'),fi;
      for(fi=0;fi<allF.length;fi++){allF[fi].style.color='#9CA3AF';allF[fi].style.borderColor='rgba(255,255,255,0.1)';allF[fi].style.background='rgba(255,255,255,0.03)';}
      el.style.color='var(--cyan)';el.style.borderColor='var(--cyan)';el.style.background='rgba(0,217,255,0.1)';
      RF.foot=el.getAttribute('data-foot2');return;
    }

    if(el.getAttribute('data-vote')&&el.getAttribute('data-pid')){
      if(!APP.me){alert('Bitte einloggen!');return;}
      var pollId=parseInt(el.getAttribute('data-pid')),vote=el.getAttribute('data-vote'),pi2;
      for(pi2=0;pi2<APP.polls.length;pi2++){
        if(APP.polls[pi2].id===pollId){
          var newVotes=JSON.parse(JSON.stringify(APP.polls[pi2].votes||{}));
          if(newVotes[APP.me.id]===vote)delete newVotes[APP.me.id];
          else newVotes[APP.me.id]=vote;
          haptic('light');dbUpdate('polls',pollId,{votes:newVotes}).then(function(){loadAll(function(){go('voting');});});
          return;
        }
      }
      return;
    }

    if(el.getAttribute('data-fixpoll')){
      var fid=parseInt(el.getAttribute('data-fixpoll')),fpi;
      for(fpi=0;fpi<APP.polls.length;fpi++){
        if(APP.polls[fpi].id===fid){
          var yc=0,vvv;for(vvv in APP.polls[fpi].votes){if(APP.polls[fpi].votes[vvv]==='yes')yc++;}
          if(yc>=6){
            var newEv={date:APP.polls[fpi].date,time:APP.polls[fpi].time,location:APP.polls[fpi].location,participants:[],waitlist:[],motm_votes:{},max_players:14};
            showLoader();
            Promise.all([dbInsert('events',newEv),dbDelete('polls',fid)]).then(function(){
              sendPush('Spiel ist FIX! &#9917;', APP.polls[fpi].date+' | '+APP.polls[fpi].time+' Uhr | '+APP.polls[fpi].location+' | Jetzt zusagen!');
              loadAll(function(){go('home');});
            });
          }
          break;
        }
      }
      return;
    }

    if(el.getAttribute('data-joinev')){
      if(!APP.me){alert('Bitte einloggen!');return;}
      var eid=parseInt(el.getAttribute('data-joinev')),ei;
      for(ei=0;ei<APP.events.length;ei++){
        if(APP.events[ei].id===eid){
          var ev2=APP.events[ei];
          var parts2=JSON.parse(JSON.stringify(ev2.participants||[]));
          if(parts2.indexOf(APP.me.id)!==-1)return;
          if(parts2.length>=ev2.max_players){alert('Spiel voll!');return;}
          parts2.push(APP.me.id);
          var evObj2=APP.events[ei2];
          if(parts2.length>=evObj2.max_players){
            sendPush('Teams sind VOLL! &#128274;', evObj2.date+' | '+evObj2.location+' | Nur noch Warteliste!');
          } else if(parts2.length===12){
            sendPush('Spiel findet statt! &#10003;', evObj2.date+' | '+evObj2.location+' | 12 Spieler dabei!');
          }
          haptic('success');dbUpdate('events',eid,{participants:parts2}).then(function(){loadAll(function(){go('event_'+eid);});});
          return;
        }
      }
      return;
    }

    if(el.getAttribute('data-leaveev')){
      if(!APP.me)return;
      var lid=parseInt(el.getAttribute('data-leaveev')),li;
      for(li=0;li<APP.events.length;li++){
        if(APP.events[li].id===lid){
          var ev3=APP.events[li];
          var parts3=JSON.parse(JSON.stringify(ev3.participants||[]));
          var wait3=JSON.parse(JSON.stringify(ev3.waitlist||[]));
          parts3=parts3.filter(function(p){return p!==APP.me.id;});
          if(wait3.length>0&&parts3.length<ev3.max_players){parts3.push(wait3.shift());}
          dbUpdate('events',lid,{participants:parts3,waitlist:wait3}).then(function(){loadAll(function(){go('event_'+lid);});});
          return;
        }
      }
      return;
    }

    if(el.getAttribute('data-waitlist')){
      if(!APP.me){alert('Bitte einloggen!');return;}
      var wid=parseInt(el.getAttribute('data-waitlist')),wi;
      for(wi=0;wi<APP.events.length;wi++){
        if(APP.events[wi].id===wid){
          var wait4=JSON.parse(JSON.stringify(APP.events[wi].waitlist||[]));
          var parts4=APP.events[wi].participants||[];
          if(wait4.indexOf(APP.me.id)!==-1||parts4.indexOf(APP.me.id)!==-1){alert('Du bist bereits dabei!');return;}
          wait4.push(APP.me.id);
          dbUpdate('events',wid,{waitlist:wait4}).then(function(){loadAll(function(){go('event_'+wid);});});
          return;
        }
      }
      return;
    }

    if(el.getAttribute('data-motm')){
      if(!APP.me)return;
      var motmVal=el.getAttribute('data-motm').split('_');
      var evId2=parseInt(motmVal[0]),playerId=parseInt(motmVal[1]),mi;
      for(mi=0;mi<APP.events.length;mi++){
        if(APP.events[mi].id===evId2){
          var motmV2=JSON.parse(JSON.stringify(APP.events[mi].motm_votes||{}));
          if(motmV2[APP.me.id]===playerId)delete motmV2[APP.me.id];
          else motmV2[APP.me.id]=playerId;
          dbUpdate('events',evId2,{motm_votes:motmV2}).then(function(){loadAll(function(){go('motm');});});
          return;
        }
      }
      return;
    }

    if(el.getAttribute('data-deleteaccount')){
      if(!APP.me)return;
      if(!confirm('Konto wirklich loeschen? Alle deine Daten werden geloescht!'))return;
      var uid=APP.me.id;
      showLoader();
      dbDelete('users',uid).then(function(){
        APP.me=null;clearSession();
        loadAll(function(){go('splash');});
      });
      return;
    }
    if(el.getAttribute('data-deleteuser')){
      if(!isAdmin()){alert('Keine Berechtigung!');return;}
      var delId=parseInt(el.getAttribute('data-deleteuser'));
      if(!confirm('Spieler wirklich loeschen?'))return;
      showLoader();
      dbDelete('users',delId).then(function(){
        loadAll(function(){go('rangliste');});
      });
      return;
    }
    if(el.getAttribute('data-showphoto')){
      showPhoto(el.getAttribute('data-showphoto'),el.getAttribute('data-photoname')||'');
      return;
    }
    if(el.getAttribute('data-alert')){alert(el.getAttribute('data-alert'));return;}
    el=el.parentNode;
  }
});

// ── HAPTIC FEEDBACK ──────────────────────────────────
function haptic(type){
  try{
    if('vibrate' in navigator){
      if(type==='light') navigator.vibrate(10);
      else if(type==='medium') navigator.vibrate(25);
      else if(type==='success') navigator.vibrate([10,50,10]);
      else if(type==='error') navigator.vibrate([50,30,50]);
    }
  }catch(e){}
}

// ── PULL TO REFRESH ───────────────────────────────────
(function(){
  var startY=0, pulling=false, indicator=null;
  document.getElementById('scr').addEventListener('touchstart',function(e){
    if(this.scrollTop===0) startY=e.touches[0].clientY;
  },{passive:true});
  document.getElementById('scr').addEventListener('touchmove',function(e){
    if(startY===0)return;
    var dy=e.touches[0].clientY-startY;
    if(dy>60&&!pulling){
      pulling=true;
      if(!indicator){
        indicator=document.createElement('div');
        indicator.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--card);border:0.5px solid var(--border);border-radius:20px;padding:8px 16px;font-size:12px;color:var(--cyan);z-index:999;display:flex;align-items:center;gap:8px;';
        indicator.innerHTML='<span style="animation:spin 0.6s linear infinite;display:inline-block;">&#8635;</span> Aktualisieren...';
        document.querySelector('.app').appendChild(indicator);
      }
    }
  },{passive:true});
  document.getElementById('scr').addEventListener('touchend',function(){
    if(pulling){
      pulling=false; startY=0;
      if(indicator){indicator.remove();indicator=null;}
      loadAll(function(){
        haptic('success');
      });
    } else { startY=0; }
  });
})();

// ── SWIPE BETWEEN SCREENS ─────────────────────────────
(function(){
  var screens=['home','events','teams','rangliste','profile'];
  var startX=0;
  document.getElementById('scr').addEventListener('touchstart',function(e){
    startX=e.touches[0].clientX;
  },{passive:true});
  document.getElementById('scr').addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-startX;
    if(Math.abs(dx)<80)return; // min swipe distance
    // Find current active screen from nav
    var active=document.querySelector('.bni.act');
    if(!active)return;
    var cur=active.getAttribute('data-go');
    var idx=screens.indexOf(cur);
    if(dx<0&&idx<screens.length-1){ haptic('light'); go(screens[idx+1]); }
    else if(dx>0&&idx>0){ haptic('light'); go(screens[idx-1]); }
  });
})();

// ── INIT ──────────────────────────────────────────────
loadAll(function(){
  go(APP.me?'home':'splash');
});

})();
</script>
